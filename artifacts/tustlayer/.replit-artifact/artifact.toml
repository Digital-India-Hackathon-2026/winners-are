kind = "web"
previewPath = "/"
title = "TrustLayer AI"
version = "1.0.0"
id = "artifacts/tustlayer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20033

[services.development]
run = "pnpm --filter @workspace/tustlayer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tustlayer", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tustlayer", "run", "start" ]

[services.env]
PORT = "20033"
